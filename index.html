<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かわいいテトリス風パズル</title>
<style>
  :root{
    --sky:#cfefff;
    --mint:#e6fbff;
    --pink:#ffd6e7;
    --accent:#ff9ec4;
    --border:#ffc2d9;
  }
  body {
    background: linear-gradient(180deg, var(--sky), #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Segoe UI", sans-serif;
  }
  .wrapper{
    text-align:center;
  }
  h1{
    color:#ff8fb1;
    margin-bottom:10px;
  }
  canvas {
    background: var(--mint);
    border: 6px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }
  .hint{
    margin-top:10px;
    font-size:12px;
    color:#888;
  }
</style>
</head>
<body>
<div class="wrapper">
  <h1>💗 Tetris 💙</h1>
  <canvas id="game" width="240" height="400"></canvas>
  <div class="hint">← → 移動 / ↑ 回転 / ↓ 落下</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.scale(20, 20);

function createMatrix(w, h) {
  const matrix = [];
  while (h--) matrix.push(new Array(w).fill(0));
  return matrix;
}

function createPiece(type) {
  if (type === 'T') return [[0,1,0],[1,1,1],[0,0,0]];
  if (type === 'O') return [[2,2],[2,2]];
  if (type === 'L') return [[0,0,3],[3,3,3],[0,0,0]];
  if (type === 'J') return [[4,0,0],[4,4,4],[0,0,0]];
  if (type === 'I') return [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]];
  if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
  if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        ctx.fillStyle = colors[value];
        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
        ctx.strokeStyle = '#ffffffaa';
        ctx.lineWidth = 0.05;
        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
      }
    });
  });
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        if (arena[y + player.pos.y]) {
          arena[y + player.pos.y][x + player.pos.x] = value;
        }
      }
    });
  });
}

function collide(arena, player) {
  const [m, o] = [player.matrix, player.pos];
  for (let y = 0; y < m.length; ++y) {
    for (let x = 0; x < m[y].length; ++x) {
      if (m[y][x] !== 0 &&
         (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
        return true;
      }
    }
  }
  return false;
}

function arenaSweep() {
  outer: for (let y = arena.length - 1; y >= 0; --y) {
    for (let x = 0; x < arena[y].length; ++x) {
      if (arena[y][x] === 0) continue outer;
    }
    const row = arena.splice(y, 1)[0].fill(0);
    arena.unshift(row);
    ++y;
  }
}

function playerDrop() {
  player.pos.y++;
  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
  }
  dropCounter = 0;
}

function playerMove(dir) {
  player.pos.x += dir;
  if (collide(arena, player)) player.pos.x -= dir;
}

function rotate(matrix) {
  for (let y = 0; y < matrix.length; ++y) {
    for (let x = 0; x < y; ++x) {
      [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
  }
  matrix.forEach(row => row.reverse());
}

function playerRotate() {
  const pos = player.pos.x;
  rotate(player.matrix);
  if (collide(arena, player)) {
    player.pos.x = pos;
  }
}

function playerReset() {
  const pieces = 'TJLOSZI';
  player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
  player.pos.y = 0;
  player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

  // ★ Game Over 判定
  if (collide(arena, player)) {
    showGameOver();
  }
}

function showGameOver(){
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillRect(0, canvas.height/40 - 2, canvas.width/20, 4);

  ctx.fillStyle = "#ff6fa5";
  ctx.font = "1px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Game Over", canvas.width/40, canvas.height/40);

  setTimeout(()=>{
    resetGame();
  }, 1200);
}

function resetGame(){
  arena.forEach(row => row.fill(0));
  playerReset();
}

function draw() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawMatrix(arena, {x:0, y:0});
  drawMatrix(player.matrix, player.pos);
}

let dropCounter = 0;
let dropInterval = 800;
let lastTime = 0;

function update(time = 0) {
  const deltaTime = time - lastTime;
  lastTime = time;
  dropCounter += deltaTime;
  if (dropCounter > dropInterval) {
    playerDrop();
  }
  draw();
  requestAnimationFrame(update);
}

const colors = [
  null,
  '#ffb3c6',
  '#ffd6a5',
  '#fdffb6',
  '#caffbf',
  '#9bf6ff',
  '#a0c4ff',
  '#bdb2ff'
];

const arena = createMatrix(12, 20);

const player = {
  pos: {x:0, y:0},
  matrix: null
};

document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') playerMove(-1);
  if (event.key === 'ArrowRight') playerMove(1);
  if (event.key === 'ArrowDown') playerDrop();
  if (event.key === 'ArrowUp') playerRotate();
});

playerReset();
update();
</script>
</body>
</html>
